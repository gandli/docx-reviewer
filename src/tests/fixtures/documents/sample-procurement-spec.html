<head>
  <meta charset="utf-8" />
  <title>办公设备升级采购需求说明书</title>
  <style>
    body {
      font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
      margin: 48px;
      color: #222;
      line-height: 1.7;
      font-size: 13px;
    }
    h1, h2 {
      color: #294e80;
      margin: 0 0 16px;
    }
    h1 {
      text-align: center;
      font-size: 24px;
      margin-bottom: 28px;
    }
    h2 {
      font-size: 18px;
      margin-top: 24px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 18px;
    }
    th, td {
      border: 1px solid #333;
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
    }
    ul {
      padding-left: 20px;
    }
  </style>

<body>
  <h1>办公设备升级采购需求说明书</h1>
  <h2>一、项目背景</h2>
  <p>随着公司业务规模扩大和远程协作常态化，现有部分办公设备已连续使用超过 4 年，出现性能下降、电池续航缩短和硬件故障率升高等问题。</p>

  <h2>二、采购目标</h2>
  <ul>
    <li>提升员工日常办公效率</li>
    <li>降低设备故障造成的业务中断风险</li>
    <li>统一 IT 资产管理口径</li>
  </ul>

  <h2>三、预算与付款</h2>
  <p>预算上限为人民币 225,000 元。建议在验收通过且发票齐备后，按约定节点分阶段支付。</p>

  <h2>四、交付要求</h2>
  <table>
    <tr><th>项目</th><th>内容</th></tr>
    <tr><td>交付时间</td><td>合同签订后 7 个工作日内</td></tr>
    <tr><td>交付地点</td><td>苏州工业园区示例地址</td></tr>
    <tr><td>保修要求</td><td>3 年原厂上门保修</td></tr>
  </table>
</body>
